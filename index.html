<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ML in Computational Physics — Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="Lecture notes for Machine Learning in Computational Physics" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <style>
    :root {
      --theme-color: #2d5c8a;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section code {
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'ML in Computational Physics',
      repo: 'hbarquanta/MLinCP-Notes',
      homepage: 'Notes.md',
      loadSidebar: false,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        depth: 3,
        noData: 'No results found.',
        placeholder: 'Search notes...'
      },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            renderMathInElement(document.querySelector('.markdown-section'), {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false }
              ],
              throwOnError: false
            });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
